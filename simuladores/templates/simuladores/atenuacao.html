<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Simulador de Atenuação de Sinal</title>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #10131a;
      --surface:   #161b27;
      --surface2:  #1d2436;
      --border:    #252d42;
      --border2:   #2e3a54;

      --copper:    #e87c3e;
      --copper-lo: #3d1f0a;
      --wifi:      #e84040;
      --wifi-lo:   #3d0a0a;
      --fiber:     #3b8eff;
      --fiber-lo:  #0a1a3d;

      --text:      #e8ecf4;
      --muted:     #5a6a8a;
      --accent:    #3b8eff;

      --good:      #22c55e;
      --warn:      #f59e0b;
      --bad:       #ef4444;
      --dead:      #6b7280;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .page {
      width: 100%;
      max-width: 820px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    /* ── Title ── */
    .page-title {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .page-title span { color: var(--text); }

    /* ── Stats row ── */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr 1fr;
      gap: 10px;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .stat-card .lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .stat-card .val {
      font-size: 22px;
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }
    .stat-card .val.mono { font-family: 'JetBrains Mono', monospace; }
    #statusBadge {
      font-size: 12px;
      font-weight: 700;
      padding: 3px 9px;
      border-radius: 5px;
      display: inline-block;
      margin-top: 2px;
      font-family: 'JetBrains Mono', monospace;
    }

    /* ── Canvas area ── */
    .canvas-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 0;
      overflow: hidden;
      position: relative;
    }
    canvas#sigCanvas {
      display: block;
      width: 100%;
      height: 280px;
    }

    /* ── Alert banner ── */
    #alertBanner {
      position: absolute;
      top: 12px; left: 12px;
      font-size: 11px;
      font-weight: 700;
      font-family: 'JetBrains Mono', monospace;
      letter-spacing: 0.05em;
      padding: 4px 10px;
      border-radius: 5px;
      display: none;
    }

    /* ── Controls ── */
    .controls-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .controls-row {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }
    .ctrl-group { display: flex; flex-direction: column; gap: 5px; flex: 1; min-width: 180px; }
    .ctrl-lbl {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }

    /* Slider */
    .slider-row { display: flex; align-items: center; gap: 10px; }
    input[type=range] {
      -webkit-appearance: none;
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: var(--border2);
      outline: none;
      cursor: pointer;
    }
    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      box-shadow: 0 0 6px rgba(59,142,255,0.5);
      cursor: pointer;
    }
    input[type=range]::-moz-range-thumb {
      width: 18px; height: 18px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid var(--bg);
      cursor: pointer;
    }
    .dist-val {
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      background: var(--surface2);
      border: 1px solid var(--border2);
      border-radius: 6px;
      padding: 4px 10px;
      min-width: 56px;
      text-align: center;
    }

    /* Select */
    select {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 13px;
      font-weight: 600;
      font-family: 'Syne', sans-serif;
      cursor: pointer;
      outline: none;
      width: 100%;
    }
    select:focus { border-color: var(--accent); }

    /* Reset button */
    .btn-reset {
      background: var(--surface2);
      color: var(--text);
      border: 1px solid var(--border2);
      border-radius: 8px;
      padding: 10px 24px;
      font-size: 12px;
      font-weight: 800;
      font-family: 'Syne', sans-serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s;
      align-self: flex-end;
    }
    .btn-reset:hover { background: var(--border2); border-color: var(--accent); }
    .btn-reset:active { transform: scale(0.97); }

    /* ── Legend ── */
    .legend-row {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      align-items: center;
    }
    .leg-item {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      font-family: 'JetBrains Mono', monospace;
    }
    .leg-dot {
      width: 10px; height: 10px;
      border-radius: 2px;
    }

    /* Signal bar */
    .sig-bar-wrap {
      height: 6px;
      background: var(--border);
      border-radius: 3px;
      overflow: hidden;
      margin-top: 4px;
    }
    .sig-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.3s, background 0.3s;
    }
  </style>
</head>
<body>
<div class="page">

  <div class="page-title">Lab de Redes · <span>Simulador de Atenuação de Sinal</span></div>

  <!-- Stats -->
  <div class="stats-row">
    <div class="stat-card">
      <span class="lbl">Força do Sinal</span>
      <span class="val mono" id="vForce">—</span>
      <div class="sig-bar-wrap"><div class="sig-bar-fill" id="sigBar" style="width:0%"></div></div>
    </div>
    <div class="stat-card">
      <span class="lbl">Atenuação</span>
      <span class="val mono" id="vAtten">—</span>
    </div>
    <div class="stat-card">
      <span class="lbl">Velocidade Est.</span>
      <span class="val mono" id="vSpeed">—</span>
    </div>
    <div class="stat-card">
      <span class="lbl">Status</span>
      <span id="statusBadge">—</span>
    </div>
  </div>

  <!-- Canvas -->
  <div class="canvas-card">
    <canvas id="sigCanvas"></canvas>
    <div id="alertBanner"></div>
  </div>

  <!-- Controls -->
  <div class="controls-card">
    <div class="controls-row">
      <div class="ctrl-group" style="flex:2">
        <span class="ctrl-lbl">Distância (m)</span>
        <div class="slider-row">
          <input type="range" id="distSlider" min="1" max="500" value="50">
          <div class="dist-val"><span id="distVal">50</span>m</div>
        </div>
      </div>
      <div class="ctrl-group">
        <span class="ctrl-lbl">Meio de Transmissão</span>
        <select id="mediumSelect">
          <option value="copper">Cabo de Cobre (Cat5e/6)</option>
          <option value="wifi">Wi-Fi (2.4 GHz / obst.)</option>
          <option value="fiber">Fibra Óptica (SM)</option>
        </select>
      </div>
      <button class="btn-reset" onclick="resetSim()">Reiniciar</button>
    </div>
    <div class="legend-row">
      <div class="leg-item"><div class="leg-dot" style="background:#22c55e"></div>Ótimo (>70%)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#f59e0b"></div>Bom (40–70%)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#ef4444"></div>Fraco (10–40%)</div>
      <div class="leg-item"><div class="leg-dot" style="background:#6b7280"></div>Sem conexão (&lt;10%)</div>
    </div>
  </div>

</div>

<script>
// ── Physical models ─────────────────────────────────────────────────────────
//
// COPPER (Cat5e/Cat6 UTP):
//   Attenuation ~2 dB/100m at 100 MHz for Cat5e → ~0.02 dB/m
//   Hard limit ~100m (IEEE 802.3), usable up to ~150m degraded
//   Max speed: 1 Gbps → degrades with distance
//
// WI-FI (2.4 GHz, indoor obstacles):
//   Free-space path loss: FSPL = 20log10(d) + 20log10(f) + 20log10(4π/c)
//   At 2.4 GHz: FSPL(dB) ≈ 40.05 + 20log10(d[m]) for d>1m
//   Obstacles add ~3–14 dB per wall. We model ~10 dB/obstacle (~5m spacing)
//   Receiver sensitivity typically –80 dBm, TX power 20 dBm → link budget 100 dB
//
// FIBER (Single-mode OS2):
//   Attenuation ~0.2 dB/km at 1550 nm → 0.0002 dB/m
//   Link budget ~30 dB for transceiver → ~150 km reach (we cap display at 500m for UI)
//   Speed: 10 Gbps+ — essentially flat at these distances

const MEDIA = {
  copper: {
    color: '#e87c3e',
    colorLo: '#7a3510',
    name: 'Cabo de Cobre',
    maxDist: 500,
    // Signal strength 0→1 as function of distance (meters)
    signalFn(d) {
      // IEEE: 100m = ~80% usable, 150m = ~40%, beyond = rapid drop
      if (d <= 5)   return 1.0;
      if (d <= 100) return 1.0 - (d - 5) * 0.0021; // ~80% at 100m
      if (d <= 150) return 0.79 - (d - 100) * 0.008; // ~39% at 150m
      if (d <= 200) return Math.max(0.02, 0.39 - (d - 150) * 0.007);
      return Math.max(0, 0.04 - (d - 200) * 0.0001);
    },
    attenFn(d) {
      // ~2 dB/100m at 100 MHz for cat5e
      return (d * 0.02).toFixed(1) + ' dB';
    },
    speedFn(sig) {
      if (sig > 0.75) return '1 Gbps';
      if (sig > 0.5)  return '100 Mbps';
      if (sig > 0.25) return '10 Mbps';
      if (sig > 0.08) return '~1 Mbps';
      return '—';
    },
    limitDist: 100,
    limitLabel: 'Limite técnico (100m)',
    waveStyle: 'damped',
    icon: 'connector',
    rxIcon: 'laptop',
  },
  wifi: {
    color: '#e84040',
    colorLo: '#7a1010',
    name: 'Wi-Fi 2.4 GHz',
    maxDist: 500,
    signalFn(d) {
      // FSPL + obstacle penalty (~10 dB per wall, walls every 5m)
      const walls = Math.floor(d / 5);
      const fspl = 40.05 + 20 * Math.log10(Math.max(1, d));
      const obstacleLoss = walls * 10; // dB per wall
      const totalLoss = fspl + obstacleLoss;
      const linkBudget = 100; // dBm (20dBm TX - (-80dBm RX sens))
      const sig = Math.max(0, (linkBudget - totalLoss) / linkBudget);
      return Math.min(1, sig);
    },
    attenFn(d) {
      const walls = Math.floor(d / 5);
      const fspl = 40.05 + 20 * Math.log10(Math.max(1, d));
      return (fspl + walls * 10).toFixed(1) + ' dB';
    },
    speedFn(sig) {
      if (sig > 0.7)  return '300 Mbps';
      if (sig > 0.45) return '54 Mbps';
      if (sig > 0.25) return '11 Mbps';
      if (sig > 0.08) return '~1 Mbps';
      return '—';
    },
    limitDist: null,
    waveStyle: 'damped',
    icon: 'router',
    rxIcon: 'phone',
  },
  fiber: {
    color: '#3b8eff',
    colorLo: '#0a2050',
    name: 'Fibra Óptica SM',
    maxDist: 500,
    signalFn(d) {
      // 0.2 dB/km = 0.0002 dB/m, link budget 30 dB → 150,000 m
      const loss = d * 0.0002;
      const budget = 30;
      return Math.max(0, (budget - loss) / budget);
    },
    attenFn(d) {
      return (d * 0.0002).toFixed(3) + ' dB';
    },
    speedFn(sig) {
      if (sig > 0.1) return '10 Gbps+';
      return '—';
    },
    limitDist: null,
    waveStyle: 'sine',
    icon: 'connector',
    rxIcon: 'laptop',
  },
};

// ── State ──────────────────────────────────────────────────────────────────
let dist = 50;
let medium = 'copper';

const canvas   = document.getElementById('sigCanvas');
const ctx      = canvas.getContext('2d');
const slider   = document.getElementById('distSlider');
const distVal  = document.getElementById('distVal');
const medSel   = document.getElementById('mediumSelect');

// ── Canvas sizing ──────────────────────────────────────────────────────────
function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const w = canvas.parentElement.clientWidth;
  const h = 280;
  canvas.width  = w * dpr;
  canvas.height = h * dpr;
  canvas.style.width  = w + 'px';
  canvas.style.height = h + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

// ── Waveform math ──────────────────────────────────────────────────────────
function dampedWave(x, amplitude, freq, phase, decay) {
  return amplitude * Math.exp(-decay * x) * Math.sin(freq * x + phase);
}

function sineWave(x, amplitude, freq, phase) {
  return amplitude * Math.sin(freq * x + phase);
}

// ── Draw ───────────────────────────────────────────────────────────────────
function draw() {
  resizeCanvas();
  const W = canvas.clientWidth;
  const H = canvas.clientHeight;
  const med = MEDIA[medium];
  const sig = med.signalFn(dist);
  const color = med.color;

  ctx.clearRect(0, 0, W, H);

  // Background grid
  ctx.strokeStyle = 'rgba(255,255,255,0.03)';
  ctx.lineWidth = 1;
  for (let x = 0; x < W; x += 50) {
    ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
  }
  for (let y = 0; y < H; y += 40) {
    ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
  }

  // Baseline (center)
  const midY = H * 0.52;
  ctx.strokeStyle = 'rgba(255,255,255,0.08)';
  ctx.setLineDash([6, 6]);
  ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(0, midY); ctx.lineTo(W, midY); ctx.stroke();
  ctx.setLineDash([]);

  // Limit line for copper
  if (med.limitDist !== null) {
    const lx = (med.limitDist / dist) * (W - 80) + 60;
    if (lx > 0 && lx < W) {
      ctx.strokeStyle = 'rgba(239,68,68,0.5)';
      ctx.setLineDash([5, 5]);
      ctx.lineWidth = 1.5;
      ctx.beginPath(); ctx.moveTo(lx, 20); ctx.lineTo(lx, H - 20); ctx.stroke();
      ctx.setLineDash([]);
      ctx.fillStyle = 'rgba(239,68,68,0.9)';
      ctx.font = '700 10px JetBrains Mono, monospace';
      ctx.textAlign = 'center';
      ctx.fillText(med.limitLabel, lx, 17);
      // distance marker
      ctx.fillStyle = 'rgba(239,68,68,0.7)';
      ctx.font = '700 11px JetBrains Mono, monospace';
      ctx.fillText(dist + 'M', lx, 34);
      ctx.textAlign = 'left';
    }
  } else {
    // Show distance at receiver end
    const rx = W - 50;
    ctx.fillStyle = color;
    ctx.font = '700 12px JetBrains Mono, monospace';
    ctx.textAlign = 'center';
    ctx.fillText(dist + 'M', rx, 34);
    ctx.textAlign = 'left';
  }

  // ── Wave path ─────────────────────────────────────────────────────────
  const startX = 60;
  const endX   = W - 50;
  const waveW  = endX - startX;

  ctx.beginPath();
  ctx.lineWidth = 2.5;

  let prevColor = color;
  let gradientPath = true;

  if (med.waveStyle === 'sine') {
    // Fiber: clean sine, stable amplitude (very low attenuation)
    const amp = H * 0.22 * Math.max(0.3, sig);
    const cycles = 3.5;
    const freq = (2 * Math.PI * cycles) / waveW;
    for (let i = 0; i <= waveW; i++) {
      const x = startX + i;
      const t = i / waveW;
      const y = midY + sineWave(i, amp, freq, 0);
      if (i === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    // Glow
    ctx.shadowColor = color;
    ctx.shadowBlur = 12;
    ctx.strokeStyle = color;
    ctx.stroke();
    ctx.shadowBlur = 0;

    // Add dots on zero crossings
    const nCrossings = cycles * 2;
    for (let c = 1; c <= nCrossings; c++) {
      const cx = startX + (c / nCrossings) * waveW;
      ctx.beginPath();
      ctx.arc(cx, midY, 4, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = 8;
      ctx.fill();
      ctx.shadowBlur = 0;
    }

  } else {
    // Copper / Wi-Fi: damped sinusoid
    const initialAmp = H * 0.26;
    const decayRate  = medium === 'wifi'
      ? 0.012 + (1 - sig) * 0.025
      : 0.008 + (1 - sig) * 0.018;
    const freq = (2 * Math.PI * 2.2) / waveW;

    // Gradient stroke via segments
    const step = 2;
    for (let i = 0; i <= waveW - step; i += step) {
      const t0 = i / waveW;
      const t1 = (i + step) / waveW;
      const x0 = startX + i, x1 = startX + i + step;
      const y0 = midY + dampedWave(i, initialAmp, freq, 0, decayRate);
      const y1 = midY + dampedWave(i + step, initialAmp, freq, 0, decayRate);

      // Color: bright at source → dims as signal weakens with distance
      const localSig = Math.exp(-decayRate * i);
      const alpha = Math.max(0.15, localSig);
      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = hexAlpha(color, alpha);
      ctx.shadowColor = color;
      ctx.shadowBlur = localSig > 0.5 ? 8 : 2;
      ctx.lineWidth = 2.5;
      ctx.stroke();
    }
    ctx.shadowBlur = 0;
    // No more fill needed; done above
    gradientPath = false;
  }

  if (gradientPath) {
    ctx.stroke();
    ctx.shadowBlur = 0;
  }

  // ── TX Icon ────────────────────────────────────────────────────────────
  drawIcon(ctx, med.icon, 18, midY - 26, color, 'TRANSMISSOR');

  // ── RX Icon ────────────────────────────────────────────────────────────
  drawIcon(ctx, med.rxIcon, W - 50, midY - 26, sig < 0.1 ? '#6b7280' : color, dist + 'm');

  // ── Update stats ──────────────────────────────────────────────────────
  updateStats(sig, med);
}

// ── Hex to rgba helper ─────────────────────────────────────────────────────
function hexAlpha(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16);
  const g = parseInt(hex.slice(3,5),16);
  const b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

// ── Icons drawn with canvas paths ─────────────────────────────────────────
function drawIcon(ctx, type, x, y, color, label) {
  ctx.save();
  ctx.strokeStyle = color;
  ctx.fillStyle = color;
  ctx.lineWidth = 2;
  ctx.lineCap = 'round';
  ctx.lineJoin = 'round';

  if (type === 'connector') {
    // Three vertical bars (connector symbol)
    ctx.beginPath();
    ctx.roundRect(x, y, 30, 24, 4);
    ctx.strokeStyle = color;
    ctx.fillStyle = hexAlpha(color, 0.12);
    ctx.fill();
    ctx.stroke();
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(x + 8 + i * 7, y + 24);
      ctx.lineTo(x + 8 + i * 7, y + 32);
      ctx.stroke();
    }
  } else if (type === 'router') {
    // Router shape
    ctx.beginPath();
    ctx.roundRect(x, y + 10, 32, 16, 3);
    ctx.fillStyle = hexAlpha(color, 0.12);
    ctx.fill();
    ctx.stroke();
    // Antenna
    ctx.beginPath();
    ctx.moveTo(x + 16, y + 10);
    ctx.lineTo(x + 16, y);
    ctx.stroke();
    // Wi-Fi arcs
    for (let r = 1; r <= 3; r++) {
      ctx.beginPath();
      ctx.arc(x + 16, y + 10, r * 5, Math.PI * 1.25, Math.PI * 1.75);
      ctx.strokeStyle = hexAlpha(color, 0.5 + r * 0.1);
      ctx.stroke();
    }
    // Dots on body
    for (let i = 0; i < 4; i++) {
      ctx.beginPath();
      ctx.arc(x + 5 + i * 8, y + 18, 2, 0, Math.PI * 2);
      ctx.fillStyle = color;
      ctx.fill();
    }
  } else if (type === 'laptop') {
    // Laptop
    ctx.beginPath();
    ctx.roundRect(x + 2, y, 28, 18, 2);
    ctx.fillStyle = hexAlpha(color, 0.12);
    ctx.fill();
    ctx.stroke();
    // Screen content (4 lines)
    ctx.strokeStyle = hexAlpha(color, 0.4);
    ctx.lineWidth = 1;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath(); ctx.moveTo(x+6, y+4+i*4); ctx.lineTo(x+26, y+4+i*4); ctx.stroke();
    }
    // Base
    ctx.strokeStyle = color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(x, y + 18); ctx.lineTo(x + 32, y + 18);
    ctx.lineTo(x + 35, y + 24); ctx.lineTo(x - 3, y + 24);
    ctx.closePath();
    ctx.fillStyle = hexAlpha(color, 0.15);
    ctx.fill(); ctx.stroke();
  } else if (type === 'phone') {
    // Phone
    ctx.beginPath();
    ctx.roundRect(x + 6, y, 20, 32, 4);
    ctx.fillStyle = hexAlpha(color, 0.12);
    ctx.fill();
    ctx.stroke();
    // Home button
    ctx.beginPath();
    ctx.arc(x + 16, y + 28, 3, 0, Math.PI * 2);
    ctx.fillStyle = hexAlpha(color, 0.5);
    ctx.fill();
  }

  // Label
  ctx.fillStyle = color;
  ctx.font = '700 9px JetBrains Mono, monospace';
  ctx.textAlign = 'center';
  ctx.fillText(label, x + 16, y - 4);
  ctx.textAlign = 'left';
  ctx.restore();
}

// ── Update stat cards ─────────────────────────────────────────────────────
function updateStats(sig, med) {
  const pct = Math.round(sig * 100);

  // Force
  const forceEl = document.getElementById('vForce');
  forceEl.textContent = pct + '%';
  forceEl.style.color = pct > 70 ? '#22c55e' : pct > 40 ? '#f59e0b' : pct > 10 ? '#ef4444' : '#6b7280';

  // Signal bar
  const bar = document.getElementById('sigBar');
  bar.style.width = pct + '%';
  bar.style.background = pct > 70 ? '#22c55e' : pct > 40 ? '#f59e0b' : pct > 10 ? '#ef4444' : '#6b7280';

  // Attenuation
  document.getElementById('vAtten').textContent = med.attenFn(dist);

  // Speed
  document.getElementById('vSpeed').textContent = med.speedFn(sig);

  // Status badge
  const badge = document.getElementById('statusBadge');
  let statusText, bgColor, txtColor;
  if (pct > 70) {
    statusText = 'Sinal Ótimo';
    bgColor = 'rgba(34,197,94,0.15)'; txtColor = '#22c55e';
  } else if (pct > 40) {
    statusText = 'Sinal Bom';
    bgColor = 'rgba(245,158,11,0.15)'; txtColor = '#f59e0b';
  } else if (pct > 25) {
    statusText = 'Perda de Pacotes / Instável';
    bgColor = 'rgba(239,68,68,0.15)'; txtColor = '#ef4444';
  } else if (pct > 8) {
    statusText = 'Sem Conexão / Desconectando';
    bgColor = 'rgba(239,68,68,0.2)'; txtColor = '#ef4444';
  } else {
    statusText = 'Sem Sinal';
    bgColor = 'rgba(107,114,128,0.2)'; txtColor = '#6b7280';
  }
  badge.textContent = statusText;
  badge.style.background = bgColor;
  badge.style.color = txtColor;

  // Alert banner
  const alert = document.getElementById('alertBanner');
  if (medium === 'copper' && dist > 100) {
    alert.style.display = 'block';
    alert.textContent = '⚠  Repetidor / Switch necessário!';
    alert.style.background = 'rgba(239,68,68,0.18)';
    alert.style.color = '#ef4444';
    alert.style.border = '1px solid rgba(239,68,68,0.35)';
  } else if (pct < 10 && medium === 'wifi') {
    alert.style.display = 'block';
    alert.textContent = '⚠  Fora de alcance Wi-Fi efetivo';
    alert.style.background = 'rgba(239,68,68,0.18)';
    alert.style.color = '#ef4444';
    alert.style.border = '1px solid rgba(239,68,68,0.35)';
  } else {
    alert.style.display = 'none';
  }

  // Thumb color
  slider.style.setProperty('--thumb', med.color);
}

// ── Interactivity ──────────────────────────────────────────────────────────
slider.addEventListener('input', () => {
  dist = parseInt(slider.value);
  distVal.textContent = dist;
  draw();
});

medSel.addEventListener('change', () => {
  medium = medSel.value;
  // Adjust slider max per medium
  const maxMap = { copper: 300, wifi: 300, fiber: 500 };
  slider.max = maxMap[medium];
  if (dist > slider.max) { dist = parseInt(slider.max); slider.value = dist; distVal.textContent = dist; }
  draw();
});

function resetSim() {
  dist = 50; slider.value = 50; distVal.textContent = 50;
  medium = 'copper'; medSel.value = 'copper';
  slider.max = 300;
  draw();
}

window.addEventListener('resize', draw);
draw();
</script>
